name: Radar Minero PRO

on:

  schedule:
    - cron: '*/30 * * * *'

  workflow_dispatch:


jobs:

  run:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v3

      - name: Instalar python

        uses: actions/setup-python@v4

        with:
          python-version: '3.11'

      - name: Instalar librerías

        run: pip install -r requirements.txt

      - name: Ejecutar Radar

        env:

          TOKEN: ${{ secrets.TOKEN }}

          CHAT_ID: ${{ secrets.CHAT_ID }}

        run: python radar.py

      - name: Ejecutar aprendizaje

        env:

          TOKEN: ${{ secrets.TOKEN }}

          CHAT_ID: ${{ secrets.CHAT_ID }}

        run: python bot_telegram.py

      - name: Guardar cambios

        run: |

          git config --global user.name "bot"

          git config --global user.email "bot@bot.com"

          git add .

          git commit -m "update memoria" || exit 0

          git push
