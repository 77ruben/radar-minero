name: Radar Minero V10 con IA

on:
  schedule:
    # Se ejecutará cada 6 horas automáticamente
    - cron: '0 */6 * * *'
  workflow_dispatch: # Esto permite darle al botón "Run" manualmente

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar repositorio
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Instalar librerías necesarias
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 google-generativeai

    - name: Ejecutar Radar Minero
      env:
        TOKEN: ${{ secrets.TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
        GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
      run: python radar.py

    - name: Guardar historial de avisos vistos
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add seen_jobs.json
        git commit -m "Actualizar historial de avisos" || exit 0
        git push
