name: Radar Minero V10 IA

- name: Commit historial
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add historial.json
          git commit -m "update historial" || echo "no changes"
          git push

on:
  schedule:
    - cron: '0 */6 * * *' # Se ejecuta solo cada 6 horas
  workflow_dispatch: # Permite que tú le des al botón "Run" manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar Librerías (ESTO ES LO QUE FALTA)
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 google-generativeai

      - name: Ejecutar Radar
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: python radar.py

      - name: Guardar historial de avisos
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"
          git add seen_jobs.json
          git commit -m "Update seen jobs" || exit 0
          git push

          - name: Guardar memoria
  uses: actions/upload-artifact@v4
  with:
    name: memoria
    path: memoria.json
