name: Radar Minero V10 IA

on:
  schedule:
    - cron: '0 */6 * * *' # Se ejecuta cada 6 horas automáticamente
  workflow_dispatch: # Permite ejecución manual con el botón Run

jobs:
  run-radar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar Librerías (El ingrediente faltante)
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 google-generativeai

      - name: Ejecutar Radar
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: python radar.py

      - name: Guardar historial (para no repetir avisos)
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"
          git add seen_jobs.json
          git commit -m "Actualizar historial de empleos" || exit 0
          git push
